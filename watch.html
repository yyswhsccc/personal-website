<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffd9ec">
<title>yongshanOS ⌚</title>
<style>
  /* ⌚ wrist edition — one file, zero dependencies, pure Y2K jelly */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    background: linear-gradient(180deg, #ffd9ec 0%, #f3e0f8 40%, #d9eafc 75%, #c8f3f7 100%);
    color: #5a3d6e;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #app { width: 100%; max-width: 230px; text-align: center; }
  .clock {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #b0186c;
    text-shadow: 1px 1px 0 #fff, 2px 2px 0 rgba(240, 80, 159, 0.35);
    line-height: 1.1;
  }
  .clock small { display: block; font-size: 9px; letter-spacing: 1px; color: #8a6da3; font-weight: 400; }
  #slime-tap {
    display: block;
    margin: 6px auto 2px;
    border: 0;
    background: transparent;
    line-height: 0;
    -webkit-touch-callout: none;
  }
  canvas { image-rendering: pixelated; }
  .fans { font-size: 11px; color: #b0186c; min-height: 14px; }
  .stats { font-size: 9px; color: #8a6da3; min-height: 12px; }
  .garden {
    margin: 8px auto 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.55);
    border: 2px solid #f0509f;
    border-radius: 10px;
    padding: 6px 8px;
    font-size: 10px;
    color: #5a3d6e;
  }
  .garden-bar { height: 7px; background: #efe3f6; border: 1px solid #c9a7f5; border-radius: 4px; overflow: hidden; margin-top: 4px; }
  .garden-bar i { display: block; height: 100%; background: linear-gradient(90deg, #7ee0a3, #57c689); transition: width 1s linear; }
  .btn {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 12px 8px;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(#ff8fc7, #f0509f);
    border: 2px solid #5a3d6e;
    border-radius: 12px;
    box-shadow: 0 3px 0 #5a3d6e;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #5a3d6e; }
  .btn[disabled] { opacity: 0.45; box-shadow: 0 3px 0 #9a86ab; }
  .btn.ready { animation: throb 1.2s ease-in-out infinite; }
  @keyframes throb { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .pin {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #b0186c;
    background: #fff;
    border: 3px solid #f0509f;
    border-radius: 14px;
    padding: 10px 4px 10px 12px;
    margin: 10px 0;
    text-shadow: 2px 2px 0 rgba(240, 80, 159, 0.25);
  }
  .hint { font-size: 10px; line-height: 1.5; color: #6d5585; }
  .hint b { color: #b0186c; }
  .status { font-size: 10px; min-height: 14px; margin-top: 6px; color: #8a6da3; }
  .heart {
    position: fixed;
    font-size: 16px;
    pointer-events: none;
    animation: float-up 1.1s ease-out forwards;
  }
  @keyframes float-up { to { transform: translateY(-46px) scale(1.5); opacity: 0; } }
  .offline { color: #d6323e; }
  .tiny { font-size: 8px; color: #9a86ab; margin-top: 6px; }
</style>
</head>
<body>
<div id="app" aria-live="polite"></div>
<script>
(function () {
  'use strict';
  /* the wrist client speaks the same counter dialect as the big site */
  var API = 'https://abacus.jasoncameron.dev';
  var NS = 'yongshanos-yyswhsccc';
  var ABC = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  var app = document.getElementById('app');
  var LS = {
    get: function (k, f) { try { var v = localStorage.getItem(k); return v === null ? f : JSON.parse(v); } catch (e) { return f; } },
    set: function (k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }
  };
  function numToUid(n) {
    n = Math.max(0, Math.floor(n) - 1);
    var s = '';
    for (var i = 0; i < 6; i++) { s += ABC[n % 31]; n = Math.floor(n / 31); }
    return s;
  }
  function get(key) {
    return fetch(API + '/get/' + NS + '/' + key)
      .then(function (r) { return r.ok ? r.json() : { value: 0 }; })
      .then(function (d) { return Math.max(0, Number(d.value) || 0); })
      .catch(function () { return 0; });
  }
  function hit(key) {
    // honest hits: resolve true only when the cloud really counted it
    return fetch(API + '/hit/' + NS + '/' + key)
      .then(function (r) { return r.ok; })
      .catch(function () { return false; });
  }

  /* ---- the pixel slime, drawn by hand, worn on a wrist ---- */
  var ROWS = [
    '......FF......',
    '.....FYYF.....',
    '......FF......',
    '......S.......',
    '....PPPPPP....',
    '..PPPPPPPPPP..',
    '.PwwPPPPPPPPP.',
    '.PwPPPPPPPPPP.',
    'PPPePPPPPPePPP',
    'PPPePPPPPPePPP',
    'PPuPPPmmPPuPPP',
    'PPPPPPmmPPPPPP',
    '.PPPPPPPPPPPP.',
    '..DDDDDDDDDD..'
  ];
  var PAL = { P: '#ff9ed2', D: '#d6539b', w: '#ffffff', e: '#14020e', m: '#b0186c', u: '#ff6fb0', S: '#57c689', F: '#ff8fc7', Y: '#ffd400' };
  var CELL = 8, CW = 14 * CELL, CH = 14 * CELL;
  var cv, ctx, base;
  function buildBase() {
    base = document.createElement('canvas');
    base.width = CW; base.height = CH;
    var b = base.getContext('2d');
    ROWS.forEach(function (row, y) {
      for (var x = 0; x < row.length; x++) {
        var ch = row[x];
        if (ch === '.') continue;
        b.fillStyle = PAL[ch] || PAL.P;
        b.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    });
  }
  var squish = 0, blinkAt = Date.now() + 2500;
  function drawSlime() {
    if (!ctx) return;
    ctx.clearRect(0, 0, CW, CH);
    var s = squish > 0 ? 1 - 0.08 * Math.sin((squish / 6) * Math.PI) : 1;
    if (squish > 0) squish--;
    ctx.save();
    ctx.translate(CW / 2, CH);
    ctx.scale(2 - s, s);
    ctx.drawImage(base, -CW / 2, -CH);
    ctx.restore();
    var now = Date.now();
    if (now > blinkAt) {
      if (now > blinkAt + 160) blinkAt = now + 1800 + Math.random() * 2600;
      else { // two sleepy dashes over the eyes
        ctx.fillStyle = PAL.P; ctx.fillRect(3 * CELL, 8 * CELL, CELL, 2 * CELL); ctx.fillRect(10 * CELL, 8 * CELL, CELL, 2 * CELL);
        ctx.fillStyle = PAL.e; ctx.fillRect(3 * CELL, 9 * CELL, CELL, 2); ctx.fillRect(10 * CELL, 9 * CELL, CELL, 2);
      }
    }
  }

  function el(tag, cls, txt) { var e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }
  function heartAt(x, y) {
    var h = el('span', 'heart', ['♡', '♥', '🫧', '✦'][Math.floor(Math.random() * 4)]);
    h.style.left = (x - 8 + Math.random() * 16) + 'px';
    h.style.top = (y - 10) + 'px';
    document.body.appendChild(h);
    setTimeout(function () { h.remove(); }, 1100);
  }

  /* ---------- pairing screen: the watch only DISPLAYS. never types. ---------- */
  var pollTimer = null, clockTimer = null, drawTimer = null, wstTimer = null, flushTimer = null, gardenTimer = null;
  var onVisible = null; // the active screen's "we're back!!" hook
  function clearTimers() {
    [pollTimer, clockTimer, drawTimer, wstTimer, flushTimer, gardenTimer].forEach(function (t) { if (t) clearInterval(t); });
    pollTimer = clockTimer = drawTimer = wstTimer = flushTimer = gardenTimer = null;
  }
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && onVisible) onVisible(); // wrist screens sleep hard — catch up the moment they wake
  });
  /* pins burn forever on the counter service (one per pairing, ever).
     never DISPLAY a burned pin: its stale value would instantly mispair
     this watch to whoever used that code before. mint until clean. */
  function mintPin(cb, attempt) {
    attempt = attempt || 0;
    var candidate = 1000 + Math.floor(Math.random() * 9000);
    if (attempt >= 6 || !navigator.onLine) { cb(candidate); return; }
    get('wpair-' + candidate).then(function (v) {
      if (v > 0) mintPin(cb, attempt + 1); // burned by pairing history — skip it
      else cb(candidate);
    });
  }
  function showPairing() {
    clearTimers();
    onVisible = null;
    app.innerHTML = '';
    app.appendChild(el('div', 'clock', 'yongshanOS ⌚'));
    app.appendChild(el('div', 'hint', 'wrist edition (a phone works too — pocket edition ♡)')).style.marginBottom = '4px';
    var pinEl = el('div', 'pin', '····');
    app.appendChild(pinEl);
    var hint = el('div', 'hint', '');
    hint.innerHTML = 'on the <b>desktop site</b>, open the terminal and type <b>watch</b> (or <b>watch CODE</b> in one go) — all the typing happens over there ♡';
    app.appendChild(hint);
    var status = el('div', 'status', 'minting a fresh code…');
    app.appendChild(status);
    var re = el('button', 'btn', 'new code');
    re.addEventListener('click', function () { LS.set('yosw-pin', 0); LS.set('yosw-pin-ts', 0); showPairing(); });
    app.appendChild(re);

    function startPolling(pin) {
      pinEl.textContent = String(pin);
      status.textContent = 'listening for the desktop…';
      var tries = 0;
      var verified = false; // first clean read proves the code is ours alone
      var mintedFresh = Date.now() - LS.get('yosw-pin-ts', 0) < 10 * 60 * 1000;
      function adopt(v) {
        clearTimers();
        LS.set('yosw-uid', numToUid(v));
        LS.set('yosw-pin', 0);
        LS.set('yosw-pin-ts', 0);
        pairSplash(function () { showHome(true); });
      }
      function checkPair() {
        if (!navigator.onLine) { status.textContent = 'offline — waiting for signal'; status.className = 'status offline'; return; }
        status.className = 'status';
        tries++;
        if (tries > 900) { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } status.textContent = 'nap time — tap the code to keep listening'; return; }
        if (tries > 70 && tries % 4 !== 0) return; // eco mode after ~3 min: one look every ~10s
        if (tries === 71) status.textContent = 'still listening (eco mode)…';
        get('wpair-' + pin).then(function (v) {
          if (v > 0 && !verified && !mintedFresh) {
            // value already there on a code we didn't just mint = somebody
            // ELSE's pairing from history. never adopt a stranger's save.
            status.textContent = 'that code went stale — minting a fresh one ♡';
            LS.set('yosw-pin', 0); LS.set('yosw-pin-ts', 0);
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
            setTimeout(showPairing, 1200);
            return;
          }
          verified = true;
          if (v > 0) adopt(v);
        });
      }
      pollTimer = setInterval(checkPair, 2600);
      checkPair(); // no 2.6s of dead air on arrival
      pinEl.addEventListener('click', function () { // tapping the code wakes a napping listener
        if (!pollTimer) { tries = 0; status.textContent = 'listening again…'; pollTimer = setInterval(checkPair, 2600); checkPair(); }
      });
      onVisible = checkPair;
    }

    var stored = LS.get('yosw-pin', 0);
    if (stored) startPolling(stored);
    else {
      mintPin(function (pin) {
        LS.set('yosw-pin', pin);
        LS.set('yosw-pin-ts', Date.now());
        startPolling(pin);
      });
    }
  }

  function pairSplash(then) {
    app.innerHTML = '';
    var s = el('div', '', '');
    s.style.cssText = 'padding:30px 6px;';
    var big = el('div', 'clock', '⌚ PAIRED!!');
    var sub = el('div', 'hint', 'this device is now the wrist slime ♡');
    sub.style.marginTop = '6px';
    s.append(big, sub);
    app.appendChild(s);
    var burst = setInterval(function () {
      heartAt(20 + Math.random() * (innerWidth - 40), innerHeight * (0.3 + Math.random() * 0.5));
    }, 130);
    setTimeout(function () { clearInterval(burst); then(); }, 2600);
  }

  /* ---------- home: clock + slime + garden. the whole OS, wrist-sized ---------- */
  function showHome(freshPair) {
    var uid = LS.get('yosw-uid', null);
    if (!uid) { showPairing(); return; }
    clearTimers();
    app.innerHTML = '';
    var clock = el('div', 'clock', '--:--');
    var sub = el('small', '', 'yongshanOS ⌚ · slime #' + uid.slice(0, 3) + '···');
    clock.appendChild(sub);
    app.appendChild(clock);
    var tap = el('button', '', '');
    tap.id = 'slime-tap';
    tap.setAttribute('aria-label', 'pet the slime');
    cv = document.createElement('canvas');
    cv.width = CW; cv.height = CH;
    cv.style.width = '112px';
    tap.appendChild(cv);
    app.appendChild(tap);
    ctx = cv.getContext('2d');
    if (!base) buildBase();
    var fans = el('div', 'fans', '♥ …');
    var stats = el('div', 'stats', '');
    app.append(fans, stats);
    var garden = el('div', 'garden', '');
    var gLabel = el('div', '', '🌱 wrist garden — plucks fly home the second you tap');
    gLabel.style.fontSize = '9px';
    var gBar = el('div', 'garden-bar', '');
    var gFill = el('i', '', '');
    gBar.appendChild(gFill);
    garden.append(gLabel, gBar);
    app.appendChild(garden);
    var pluck = el('button', 'btn', '…');
    pluck.disabled = true;
    app.appendChild(pluck);
    var tiny = el('div', 'tiny', freshPair ? 'paired ♡ everything you do here syncs home' : 'hold the clock 2s to unpair');
    app.appendChild(tiny);

    function tickClock() {
      var d = new Date();
      clock.childNodes[0].nodeValue = ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    }
    clockTimer = setInterval(tickClock, 1000);
    tickClock();
    drawTimer = setInterval(drawSlime, 90);

    /* petting: instant joy locally, polite drip to the cloud.
       plucks queue too now — offline harvests wait in the basket
       instead of evaporating (v86: nothing earned is ever lost) */
    var petsPending = LS.get('yosw-pets-q', 0);
    var petLines = ['pik!! ♡', 'more!!', 'hehe', '!!!', '♥♥♥', 'best human'];
    tap.addEventListener('click', function (ev) {
      squish = 6;
      petsPending++;
      LS.set('yosw-pets-q', petsPending);
      var r = tap.getBoundingClientRect();
      heartAt(r.left + r.width / 2 + (Math.random() - 0.5) * 40, r.top + 10);
      fans.textContent = '♥ ' + (lastFans != null ? (lastFans + petsPending) : ('+' + petsPending + ' queued'));
      if (Math.random() < 0.3) { stats.textContent = petLines[Math.floor(Math.random() * petLines.length)]; setTimeout(refreshStats, 1400); }
    });
    var flushBusy = false;
    function flushNow() {
      if (flushBusy || !navigator.onLine) return;
      var plq = LS.get('yosw-plq', 0);
      if (plq > 0) { // harvests ride first class
        flushBusy = true;
        hit('sv2-' + uid + '-wgp').then(function (ok) {
          flushBusy = false;
          if (ok) {
            LS.set('yosw-plq', Math.max(0, LS.get('yosw-plq', 0) - 1));
            stats.textContent = '🌸 synced ✓ it joins the meadow ♡';
            setTimeout(refreshStats, 3200);
            if (LS.get('yosw-plq', 0) > 0) setTimeout(flushNow, 800); // drain the basket
          } else {
            stats.textContent = '🌸 cloud hiccup — the basket keeps it safe, retrying';
            setTimeout(refreshStats, 3200);
          }
        });
        return;
      }
      if (petsPending <= 0) return;
      var send = Math.min(petsPending, 3); // three love-packets per flush, max
      for (var i = 0; i < send; i++) {
        hit('sv2-' + uid + '-wpt').then(function (ok) {
          if (ok) { petsPending = Math.max(0, petsPending - 1); LS.set('yosw-pets-q', petsPending); }
        });
      }
    }
    flushTimer = setInterval(flushNow, 4000);

    /* the garden: a real-time sprout. the FIRST one is ready in ~90s
       (hello, instant joy), then each next takes 20-35 minutes. plucking
       syncs home the very second you tap — growth is the wait, never sync. */
    function growMs() {
      var g = LS.get('yosw-grow', 0);
      if (!g) {
        g = LS.get('yosw-plucked', 0) === 0 ? 90 * 1000 : (20 + Math.floor(Math.random() * 16)) * 60 * 1000;
        LS.set('yosw-grow', g);
      }
      return g;
    }
    function gardenState() {
      var planted = LS.get('yosw-planted', 0);
      if (!planted) { planted = Date.now(); LS.set('yosw-planted', planted); }
      return Math.min(1, (Date.now() - planted) / growMs());
    }
    function gardenTick() {
      var p = gardenState();
      gFill.style.width = Math.round(p * 100) + '%';
      if (p >= 1) {
        pluck.disabled = false;
        pluck.className = 'btn ready';
        pluck.textContent = '🌸 PLUCK — sends it home!!';
      } else {
        pluck.disabled = true;
        pluck.className = 'btn';
        var msLeft = (1 - p) * growMs();
        var mins = Math.ceil(msLeft / 60000);
        pluck.textContent = msLeft < 120000 ? '🌱 almost… ' + Math.ceil(msLeft / 1000) + 's' : '🌱 growing… ' + (mins > 60 ? Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm' : mins + 'm');
      }
    }
    pluck.addEventListener('click', function () {
      if (gardenState() < 1) return;
      LS.set('yosw-plucked', LS.get('yosw-plucked', 0) + 1);
      LS.set('yosw-grow', 0); // roll a fresh 20-35min for the next one
      LS.set('yosw-planted', Date.now());
      squish = 6;
      var r = pluck.getBoundingClientRect();
      for (var i = 0; i < 5; i++) setTimeout(function () { heartAt(r.left + Math.random() * r.width, r.top); }, i * 90);
      // v86: into the basket first, THEN the cloud — offline plucks
      // survive tunnels, elevators and airplane mode ♡
      LS.set('yosw-plq', LS.get('yosw-plq', 0) + 1);
      stats.textContent = navigator.onLine ? '🌸 plucked!! sending home…' : '🌸 plucked!! safe in the basket — sends when signal returns ♡';
      flushNow();
      setTimeout(refreshStats, 3600);
      gardenTick();
    });
    gardenTimer = setInterval(gardenTick, 5000);
    gardenTick();

    /* status from home base: fans, lifetime plucks, wheel completion */
    var lastFans = null, lastStats = '';
    function refreshStats() { stats.textContent = lastStats; }
    function pollWst() {
      if (!navigator.onLine) { stats.textContent = 'offline — pets are queued ♡'; return; }
      get('sv2-' + uid + '-wst').then(function (v) {
        if (v <= 0) { lastStats = 'open the big site once to sync ♡'; refreshStats(); return; }
        v = v - 1;
        lastFans = v % 100000;
        var plucks = Math.floor(v / 100000) % 10000;
        var pct = Math.floor(v / 1000000000);
        fans.textContent = '♥ ' + lastFans + ' fans';
        lastStats = '🧺 ' + plucks + ' plucks · 🌈 wheel ' + pct + '%';
        refreshStats();
      });
    }
    wstTimer = setInterval(pollWst, 40000);
    pollWst();
    onVisible = function () { pollWst(); flushNow(); }; // wrist woke up — catch up instantly

    /* unpair: hold the clock */
    var holdT = null;
    clock.addEventListener('touchstart', function () { holdT = setTimeout(function () { if (confirm('unpair this watch?')) { LS.set('yosw-uid', null); showPairing(); } }, 2000); });
    clock.addEventListener('touchend', function () { if (holdT) clearTimeout(holdT); });
    clock.addEventListener('mousedown', function () { holdT = setTimeout(function () { if (confirm('unpair this watch?')) { LS.set('yosw-uid', null); showPairing(); } }, 2000); });
    clock.addEventListener('mouseup', function () { if (holdT) clearTimeout(holdT); });
  }

  buildBase();
  if (LS.get('yosw-uid', null)) showHome(false);
  else showPairing();
})();
</script>
</body>
</html>
